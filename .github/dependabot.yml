version: 2
updates:
  # GitHub Actions — keeps the SHA pins in .github/workflows/ fresh.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  # Python dependencies — pyproject.toml and uv.lock.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      python-dependencies:
        patterns: ["*"]
